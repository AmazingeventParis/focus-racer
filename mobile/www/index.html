<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#042F2E" />
  <title>Focus Racer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #042F2E;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      min-height: 100dvh;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }
    .loader {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }
    .logo {
      width: 96px;
      height: 96px;
      border-radius: 20px;
    }
    h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(16, 185, 129, 0.2);
      border-top-color: #10B981;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .status {
      font-size: 14px;
      color: rgba(255,255,255,0.6);
      margin-top: 8px;
    }
    .offline {
      display: none;
      text-align: center;
      padding: 20px;
    }
    .offline h2 { font-size: 20px; margin-bottom: 12px; }
    .offline p { font-size: 14px; color: rgba(255,255,255,0.6); margin-bottom: 20px; }
    .retry-btn {
      background: #10B981;
      color: #fff;
      border: none;
      padding: 12px 32px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }
    .retry-btn:active { opacity: 0.8; }
  </style>
</head>
<body>
  <div class="loader" id="loader">
    <img src="icon.png" alt="Focus Racer" class="logo" />
    <h1>Focus Racer</h1>
    <div class="spinner"></div>
    <div class="status">Connexion en cours...</div>
  </div>

  <div class="offline" id="offline">
    <h2>Pas de connexion internet</h2>
    <p>Veuillez verifier votre connexion et reessayer.</p>
    <button class="retry-btn" onclick="checkAndRedirect()">Reessayer</button>
  </div>

  <script>
    function checkAndRedirect() {
      document.getElementById('loader').style.display = 'flex';
      document.getElementById('offline').style.display = 'none';

      fetch('https://focusracer.swipego.app/api/auth/providers', { mode: 'no-cors' })
        .then(() => {
          window.location.href = 'https://focusracer.swipego.app';
        })
        .catch(() => {
          document.getElementById('loader').style.display = 'none';
          document.getElementById('offline').style.display = 'block';
        });
    }

    // This page is only shown as a fallback if the server URL fails
    // Capacitor normally loads the remote URL directly
    setTimeout(checkAndRedirect, 500);
  </script>
</body>
</html>
